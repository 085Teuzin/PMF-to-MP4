<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMF → MP4 Ultra Converter</title>
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .accent { color: var(--accent); }

        .subtitle {
            opacity: 0.6;
            font-size: 0.9rem;
        }

        #drop-zone {
            border: 2px dashed #334155;
            padding: 3rem 1rem;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            background: var(--card);
            transition: all 0.3s ease;
        }

        #drop-zone.active {
            border-color: var(--accent);
            background: #1e293b;
            transform: scale(1.02);
        }

        .icon { font-size: 2rem; margin-bottom: 1rem; }

        #file-input { display: none; }

        #file-list {
            margin: 1.5rem 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: #334155;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            animation: fadeIn 0.3s ease;
        }

        .badge {
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .download-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: var(--bg);
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status-container { margin-top: 1.5rem; }

        #status {
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .progress-bar {
            height: 6px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PMF <span class="accent">→</span> MP4</h1>
        <p class="subtitle">Conversão Profissional Local</p>
    </header>

    <div id="drop-zone">
        <div class="icon">📥</div>
        <p>Arraste arquivos .pmf ou clique para selecionar</p>
        <input type="file" id="file-input" multiple accept=".pmf">
    </div>

    <div id="file-list"></div>

    <div class="actions">
        <button id="convert-btn">Iniciar Conversão</button>
    </div>

    <div id="status-container">
        <div id="status">Pronto para iniciar</div>
        <div class="progress-bar"><div id="progress"></div></div>
    </div>
</div>

<script type="module">
    import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";
    import { fetchFile, toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

    const ffmpeg = new FFmpeg();
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const fileList = document.getElementById("file-list");
    const convertBtn = document.getElementById("convert-btn");
    const status = document.getElementById("status");
    const progress = document.getElementById("progress");

    let files = [];

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", e => handleFiles(e.target.files));

    dropZone.addEventListener("dragover", e => {
        e.preventDefault();
        dropZone.classList.add("active");
    });

    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("active"));

    dropZone.addEventListener("drop", e => {
        e.preventDefault();
        dropZone.classList.remove("active");
        handleFiles(e.dataTransfer.files);
    });

    function handleFiles(selectedFiles) {
        for (const file of selectedFiles) {
            if (!file.name.toLowerCase().endsWith(".pmf")) continue;
            files.push(file);
            const item = document.createElement("div");
            item.className = "file-item";
            item.innerHTML = `<span>${file.name}</span><span class="badge">Aguardando</span>`;
            fileList.appendChild(item);
        }
    }

    convertBtn.onclick = async () => {
        if (files.length === 0) {
            alert("Adicione arquivos PMF primeiro");
            return;
        }

        convertBtn.disabled = true;
        status.innerText = "Carregando motor FFmpeg...";

        const baseURL = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm";
        await ffmpeg.load({
            coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
            wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm"),
        });

        ffmpeg.on("progress", ({ progress: p }) => {
            progress.style.width = `${p * 100}%`;
        });

        for (const file of files) {
            status.innerText = `Convertendo: ${file.name}`;
            
            await ffmpeg.writeFile(file.name, await fetchFile(file));
            const output = file.name.replace(".pmf", ".mp4");

            await ffmpeg.exec(["-i", file.name, "-c:v", "libx264", "-preset", "fast", "-c:a", "aac", output]);

            const data = await ffmpeg.readFile(output);
            const videoBlob = new Blob([data.buffer], { type: "video/mp4" });
            const url = URL.createObjectURL(videoBlob);

            const a = document.createElement("a");
            a.href = url;
            a.download = output;
            a.className = "download-link";
            a.innerText = `Download ${output}`;
            
            const item = document.createElement("div");
            item.className = "file-item complete";
            item.appendChild(a);
            fileList.appendChild(item);
        }

        status.innerText = "Concluído!";
        convertBtn.disabled = false;
    };
</script>

</body>
</html>
