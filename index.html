<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra PMF Converter Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161e2d;
            --accent: #0ea5e9;
            --accent-hover: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border: #2d3748;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; margin: 0; font-weight: 800; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #drop-zone {
            border: 2px dashed var(--border);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(15, 23, 42, 0.5);
        }

        #drop-zone.active { border-color: var(--accent); background: rgba(14, 165, 233, 0.05); }

        .file-list {
            margin: 25px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 15px;
            padding: 12px 18px;
            background: #1e293b;
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .status-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 700; text-transform: uppercase; }
        .status-wait { background: #334155; color: #94a3b8; }
        .status-work { background: rgba(14, 165, 233, 0.2); color: var(--accent); }
        .status-done { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-primary { background: var(--accent); color: white; width: 100%; grid-column: span 2; font-size: 1.1rem; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-container { margin-top: 25px; display: none; }
        .progress-track { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        .log-box {
            margin-top: 20px;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #10b981;
            height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>PMF Ultra Converter</h1>
        <p style="color: var(--text-dim)">Processamento local de alta performance</p>
    </header>

    <div id="drop-zone">
        <input type="file" id="file-input" multiple accept=".pmf" hidden>
        <i class="fas fa-file-video" style="font-size: 2.5rem; color: var(--accent); margin-bottom: 10px;"></i>
        <p>Arraste arquivos .pmf ou clique para selecionar</p>
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="progress-container" id="progress-container">
        <div style="display:flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
            <span id="status-text">Pronto</span>
            <span id="percentage-text">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="controls">
        <button id="convert-btn" class="btn-primary" disabled>Iniciar Conversão</button>
    </div>

    <div class="log-box" id="log-box"></div>
</div>

<script type="module">
    import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";
    import { fetchFile, toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

    const ffmpeg = new FFmpeg();
    let files = [];
    let isLoaded = false;

    const dom = {
        dropZone: document.getElementById("drop-zone"),
        fileInput: document.getElementById("file-input"),
        fileList: document.getElementById("file-list"),
        convertBtn: document.getElementById("convert-btn"),
        progressContainer: document.getElementById("progress-container"),
        progressFill: document.getElementById("progress-fill"),
        statusText: document.getElementById("status-text"),
        percentageText: document.getElementById("percentage-text"),
        logBox: document.getElementById("log-box")
    };

    const log = (msg) => {
        const div = document.createElement("div");
        div.textContent = `> ${msg}`;
        dom.logBox.appendChild(div);
        dom.logBox.scrollTop = dom.logBox.scrollHeight;
    };

    async function loadFFmpeg() {
        if (isLoaded) return;
        try {
            log("Baixando bibliotecas core...");
            const baseURL = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm";
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm"),
                workerURL: await toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, "text/javascript")
            });
            isLoaded = true;
            log("FFmpeg pronto para uso.");
        } catch (e) {
            log("ERRO: " + e.message);
        }
    }

    dom.dropZone.onclick = () => dom.fileInput.click();
    dom.fileInput.onchange = (e) => handleFiles(e.target.files);
    
    dom.dropZone.ondragover = (e) => { e.preventDefault(); dom.dropZone.classList.add("active"); };
    dom.dropZone.ondragleave = () => dom.dropZone.classList.remove("active");
    dom.dropZone.ondrop = (e) => { e.preventDefault(); dom.dropZone.classList.remove("active"); handleFiles(e.dataTransfer.files); };

    function handleFiles(selected) {
        for (const file of selected) {
            if (!file.name.toLowerCase().endsWith(".pmf")) continue;
            files.push({ file, name: file.name, status: 'Aguardando', downloadUrl: null });
        }
        renderFiles();
        dom.convertBtn.disabled = files.length === 0;
    }

    function renderFiles() {
        dom.fileList.innerHTML = files.map((f, i) => `
            <div class="file-item">
                <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.name}</div>
                <span class="status-badge ${f.status === 'Concluído' ? 'status-done' : (f.status === 'Processando' ? 'status-work' : 'status-wait')}">${f.status}</span>
                <div>${f.downloadUrl ? `<a href="${f.downloadUrl}" download="${f.name.replace('.pmf', '.mp4')}" style="color:var(--accent)"><i class="fas fa-download"></i></a>` : ''}</div>
            </div>
        `).join('');
    }

    ffmpeg.on("log", ({ message }) => log(message));
    ffmpeg.on("progress", ({ progress }) => {
        const p = Math.round(progress * 100);
        dom.progressFill.style.width = `${p}%`;
        dom.percentageText.innerText = `${p}%`;
    });

    dom.convertBtn.onclick = async () => {
        dom.convertBtn.disabled = true;
        dom.progressContainer.style.display = "block";
        await loadFFmpeg();

        for (let i = 0; i < files.length; i++) {
            if (files[i].status === 'Concluído') continue;
            
            files[i].status = 'Processando';
            renderFiles();
            dom.statusText.innerText = `Convertendo: ${files[i].name}`;

            try {
                await ffmpeg.writeFile(files[i].name, await fetchFile(files[i].file));
                const outName = "output.mp4";
                
                await ffmpeg.exec(["-i", files[i].name, "-c:v", "libx264", "-preset", "ultrafast", outName]);
                
                const data = await ffmpeg.readFile(outName);
                files[i].downloadUrl = URL.createObjectURL(new Blob([data.buffer], { type: "video/mp4" }));
                files[i].status = 'Concluído';
                
                await ffmpeg.deleteFile(files[i].name);
                await ffmpeg.deleteFile(outName);
            } catch (err) {
                log("Erro: " + err.message);
                files[i].status = 'Erro';
            }
            renderFiles();
        }
        dom.statusText.innerText = "Finalizado!";
        dom.convertBtn.disabled = false;
    };
</script>

</body>
</html>
