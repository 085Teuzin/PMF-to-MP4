<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMF Ultra Converter Pro</title>
    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --sidebar: #0f1117;
            --card: #161922;
            --accent: #00f2ff;
            --text: #e2e8f0;
            --border: #2d333f;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: absolute;
            z-index: 100;
            height: 100%;
            transform: translateX(-100%);
        }

        .sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-stack {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .nav-trigger {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .converter-card {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0,242,255,0.05);
        }

        #drop-zone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 60px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        #drop-zone:hover { border-color: var(--accent); background: rgba(0,242,255,0.02); }

        .btn-main {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-box {
            margin-top: 25px;
            display: none;
        }

        .progress-bar {
            height: 6px;
            background: #000;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.2s;
        }

        .log-container {
            margin-top: 20px;
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: left;
            height: 100px;
            overflow-y: auto;
            position: relative;
        }

        .copy-log {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #222;
            border: none;
            color: #888;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .file-item-mini {
            background: #1c212c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot-waiting { background: #64748b; }
        .dot-working { background: var(--accent); animation: pulse 1s infinite; }
        .dot-done { background: #10b981; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 style="margin:0"><i class="fas fa-layer-group"></i> Fila de Arquivos</h3>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:#fff; cursor:pointer;"><i class="fas fa-times"></i></button>
    </div>
    <div class="file-stack" id="file-stack">
        <p style="text-align:center; color:#555; margin-top:20px;">Nenhum arquivo</p>
    </div>
</div>

<div class="main-content">
    <button class="nav-trigger" onclick="toggleSidebar()">🗃</button>

    <div class="converter-card">
        <h1 style="margin-top:0">PMF <span style="color:var(--accent)">PRO</span></h1>
        
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" multiple accept=".pmf" hidden>
            <i class="fas fa-cloud-upload-alt" style="font-size:3rem; color:var(--accent); margin-bottom:15px;"></i>
            <p>Solte arquivos PMF aqui</p>
            <small style="color:#555">Os arquivos não saem do seu computador</small>
        </div>

        <button id="convert-btn" class="btn-main" disabled>Converter Tudo</button>

        <div class="progress-box" id="progress-box">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem">
                <span id="current-file-name">Processando...</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div class="log-container">
            <button class="copy-log" onclick="copyLogs()">Copiar Erros</button>
            <div id="log-output" style="color:#10b981">> Aguardando comando...</div>
        </div>
    </div>
</div>

<script type="module">
    import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";
    import { fetchFile, toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

    const ffmpeg = new FFmpeg();
    let queue = [];
    let isBusy = false;

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

    const dom = {
        input: document.getElementById('file-input'),
        stack: document.getElementById('file-stack'),
        btn: document.getElementById('convert-btn'),
        log: document.getElementById('log-output'),
        progBox: document.getElementById('progress-box'),
        progFill: document.getElementById('progress-fill'),
        percent: document.getElementById('percent-text')
    };

    dom.input.onchange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            if(file.name.endsWith('.pmf')) {
                queue.push({ file, id: Math.random().toString(36).substr(2, 9), status: 'waiting' });
            }
        });
        updateUI();
    };

    function updateUI() {
        dom.btn.disabled = queue.length === 0 || isBusy;
        if(queue.length === 0) {
            dom.stack.innerHTML = '<p style="text-align:center; color:#555; margin-top:20px;">Nenhum arquivo</p>';
            return;
        }
        dom.stack.innerHTML = queue.map(item => `
            <div class="file-item-mini">
                <span><span class="status-dot dot-${item.status}"></span>${item.file.name}</span>
                ${item.url ? `<a href="${item.url}" download="${item.file.name.replace('.pmf', '.mp4')}" style="color:var(--accent)"><i class="fas fa-download"></i></a>` : ''}
            </div>
        `).join('');
    }

    function addLog(msg) {
        const line = document.createElement('div');
        line.textContent = `> ${msg}`;
        dom.log.appendChild(line);
        dom.log.scrollTop = dom.log.scrollHeight;
    }

    window.copyLogs = () => {
        navigator.clipboard.writeText(dom.log.innerText);
        alert("Logs copiados!");
    };

    ffmpeg.on('log', ({ message }) => addLog(message));
    ffmpeg.on('progress', ({ progress }) => {
        const p = Math.round(progress * 100);
        dom.progFill.style.width = p + '%';
        dom.percent.innerText = p + '%';
    });

    dom.btn.onclick = async () => {
        isBusy = true;
        updateUI();
        dom.progBox.style.display = 'block';

        if (!ffmpeg.loaded) {
            addLog("Carregando motor FFmpeg...");
            const baseURL = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm";
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm"),
                workerURL: await toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, "text/javascript")
            });
        }

        for (let item of queue) {
            if (item.status === 'done') continue;

            item.status = 'working';
            updateUI();
            document.getElementById('current-file-name').innerText = item.file.name;

            try {
                const inputName = item.file.name;
                const outputName = inputName.replace(/\.pmf$/i, '.mp4');
                
                await ffmpeg.writeFile(inputName, await fetchFile(item.file));
                
                await ffmpeg.exec(['-i', inputName, '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23', '-c:a', 'aac', outputName]);
                
                const data = await ffmpeg.readFile(outputName);
                item.url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                item.status = 'done';
                
                await ffmpeg.deleteFile(inputName);
                await ffmpeg.deleteFile(outputName);
            } catch (err) {
                addLog("ERRO CRÍTICO: " + err.message);
                item.status = 'error';
            }
            updateUI();
        }

        isBusy = false;
        dom.btn.disabled = false;
        addLog("Todos os processos finalizados.");
    };
</script>

</body>
</html>
